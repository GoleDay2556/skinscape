<!DOCTYPE html>
<html>
<head>
    <title>My Skin Editor</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        #skin-container { width: 100%; height: 500px; }
        .controls { padding: 20px; }
    </style>
</head>
<body>
    <h2>3D Skin Viewer</h2>
    <div id="skin-container"></div>
    <div class="controls">
        <input type="file" id="skin-loader" accept="image/png">
        <p>Upload a .png to view it in 3D!</p>
    </div>
    <script>
        const skinViewer = new skinview3d.SkinViewer({
            canvas: document.createElement("canvas"),
            width: 300, height: 400,
            skin: "https://bsptsh.github.io"
        });
        document.getElementById("skin-container").appendChild(skinViewer.canvas);

        document.getElementById("skin-loader").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                skinViewer.loadSkin(URL.createObjectURL(file));
            }
        });
    </script>
</body>
</html>
